<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
			    <link rel="stylesheet" href="style.css">

    <title>Courses Filter - RxJS combineLatest</title>
    
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Courses Filter Page</h1>
            <p>Reactive filtering with combineLatest • Search + Category</p>
            <div class="rxjs-badge">⚡ combineLatest | debounceTime | distinctUntilChanged</div>
        </div>

        <div class="filter-section">
            <div class="filter-title">
                <span class="icon">🎯</span>
                <span>Filter Courses</span>
            </div>
            <div class="filter-grid">
                <div class="filter-group">
                    <label>
                        <span>🔍 Search by title:</span>
                    </label>
                    <input type="text" id="searchInput" class="search-input" placeholder="Type course name... (e.g., JavaScript, React, Python)">
                </div>
                <div class="filter-group">
                    <label>
                        <span>📂 Filter by category:</span>
                    </label>
                    <select id="categorySelect" class="category-select">
                        <option value="">All Categories</option>
                    </select>
                </div>
            </div>
            <div class="filter-stats">
                <div id="activeFiltersInfo" class="active-filters"></div>
                <button id="resetFiltersBtn" class="reset-btn">Reset All Filters</button>
            </div>
        </div>

        <div class="courses-section">
            <div class="section-header">
                <h2>📚 Available Courses</h2>
                <div id="resultCount" class="result-count">0 courses</div>
            </div>
            <div id="coursesContainer" class="courses-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading courses...
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/rxjs@7.8.1/dist/bundles/rxjs.umd.min.js"></script>
    <script>
        // ========== Test Data (мінімум 6 курсів, 3+ категорії) ==========
        const mockCourses = [
            {
                id: 1,
                title: "JavaScript: The Complete Guide",
                category: "Programming",
                duration: "45 hours"
            },
            {
                id: 2,
                title: "React.js Mastery with Hooks",
                category: "Frontend",
                duration: "35 hours"
            },
            {
                id: 3,
                title: "Angular Complete Course",
                category: "Frontend",
                duration: "50 hours"
            },
            {
                id: 4,
                title: "Python for Data Science",
                category: "Data Science",
                duration: "40 hours"
            },
            {
                id: 5,
                title: "Node.js Backend Development",
                category: "Backend",
                duration: "38 hours"
            },
            {
                id: 6,
                title: "Vue.js Fundamentals",
                category: "Frontend",
                duration: "30 hours"
            },
            {
                id: 7,
                title: "TypeScript Advanced Patterns",
                category: "Programming",
                duration: "28 hours"
            },
            {
                id: 8,
                title: "Docker & Kubernetes Basics",
                category: "DevOps",
                duration: "42 hours"
            },
            {
                id: 9,
                title: "Machine Learning with Python",
                category: "Data Science",
                duration: "55 hours"
            },
            {
                id: 10,
                title: "React Native Mobile Development",
                category: "Mobile",
                duration: "48 hours"
            }
        ];

        // Отримуємо унікальні категорії
        const uniqueCategories = [...new Set(mockCourses.map(course => course.category))].sort();

        // ========== Courses Service ==========
        class CoursesService {
            getAllCourses() {
                // Повертаємо Observable з курсами (імітуємо асинхронний запит)
                return new rxjs.Observable(subscriber => {
                    // Симулюємо затримку мережі
                    setTimeout(() => {
                        subscriber.next(mockCourses);
                        subscriber.complete();
                    }, 500);
                });
            }

            getCategories() {
                return uniqueCategories;
            }
        }

        // ========== Filter Service ==========
        class FilterService {
            constructor(coursesService) {
                this.coursesService = coursesService;
            }

            // Фільтрація курсів за назвою та категорією
            filterCourses(courses, searchTerm, category) {
                let filtered = [...courses];
                
                // Фільтрація за назвою (регістронезалежна)
                if (searchTerm && searchTerm.trim() !== '') {
                    const searchLower = searchTerm.toLowerCase().trim();
                    filtered = filtered.filter(course => 
                        course.title.toLowerCase().includes(searchLower)
                    );
                }
                
                // Фільтрація за категорією
                if (category && category !== '') {
                    filtered = filtered.filter(course => 
                        course.category === category
                    );
                }
                
                return filtered;
            }

            // Отримуємо всі курси та застосовуємо фільтри
            getFilteredCourses(searchTerm, category) {
                return this.coursesService.getAllCourses().pipe(
                    rxjs.operators.map(courses => this.filterCourses(courses, searchTerm, category))
                );
            }
        }

        // ========== Initialize Services ==========
        const coursesService = new CoursesService();
        const filterService = new FilterService(coursesService);

        // ========== UI Controller with combineLatest ==========
        class CoursesFilterUI {
            constructor() {
                this.searchInput = document.getElementById('searchInput');
                this.categorySelect = document.getElementById('categorySelect');
                this.coursesContainer = document.getElementById('coursesContainer');
                this.resultCountSpan = document.getElementById('resultCount');
                this.activeFiltersInfo = document.getElementById('activeFiltersInfo');
                this.resetBtn = document.getElementById('resetFiltersBtn');
                
                // Потоки фільтрів
                this.searchStream$ = null;
                this.categoryStream$ = null;
                this.combinedStream$ = null;
                
                this.init();
            }

            init() {
                // Заповнюємо select категорій
                this.populateCategories();
                
                // Ініціалізуємо потоки
                this.initStreams();
                
                // Підписуємося на об'єднаний потік
                this.subscribeToCombinedStream();
                
                // Налаштовуємо скидання фільтрів
                this.setupResetButton();
                
                // Виводимо інформацію в консоль
                console.log('🚀 CoursesFilterPage initialized with combineLatest');
                console.log('📊 Total courses:', mockCourses.length);
                console.log('📂 Categories:', uniqueCategories);
            }

            populateCategories() {
                const categories = coursesService.getCategories();
                categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    this.categorySelect.appendChild(option);
                });
            }

            initStreams() {
                // Потік для пошуку (з debounceTime та distinctUntilChanged)
                this.searchStream$ = rxjs.fromEvent(this.searchInput, 'input').pipe(
                    rxjs.operators.map(event => event.target.value),
                    rxjs.operators.debounceTime(400), // Затримка для оптимізації
                    rxjs.operators.distinctUntilChanged(), // Ігноруємо повторювані значення
                    rxjs.operators.startWith('') // Початкове значення
                );

                // Потік для категорії
                this.categoryStream$ = rxjs.fromEvent(this.categorySelect, 'change').pipe(
                    rxjs.operators.map(event => event.target.value),
                    rxjs.operators.startWith('') // Початкове значення (всі категорії)
                );

                // Об'єднуємо потоки через combineLatest
                this.combinedStream$ = rxjs.combineLatest([
                    this.searchStream$,
                    this.categoryStream$
                ]).pipe(
                    // switchMap для отримання відфільтрованих курсів
                    rxjs.operators.switchMap(([searchTerm, category]) => {
                        console.log(`🔍 Filtering: search="${searchTerm}", category="${category}"`);
                        this.updateActiveFiltersDisplay(searchTerm, category);
                        return filterService.getFilteredCourses(searchTerm, category);
                    })
                );
            }

            subscribeToCombinedStream() {
                this.combinedStream$.subscribe({
                    next: (filteredCourses) => {
                        console.log(`✅ Filtered ${filteredCourses.length} courses`);
                        this.renderCourses(filteredCourses);
                        this.updateResultCount(filteredCourses.length);
                    },
                    error: (error) => {
                        console.error('Error in combined stream:', error);
                        this.showError(error.message);
                    }
                });
            }

            renderCourses(courses) {
                if (!courses || courses.length === 0) {
                    this.coursesContainer.innerHTML = `
                        <div class="no-results">
                            <h3>😕 No courses found</h3>
                            <p>Try adjusting your search or category filter</p>
                            <div class="suggestion">
                                💡 Suggestions: JavaScript, React, Python, or select a different category
                            </div>
                        </div>
                    `;
                    return;
                }

                this.coursesContainer.innerHTML = courses.map(course => `
                    <div class="course-card">
                        <div class="course-title">${this.escapeHtml(course.title)}</div>
                        <div class="course-category">📁 ${this.escapeHtml(course.category)}</div>
                        <div class="course-duration">
                            <span class="duration-icon">⏱️</span>
                            <span>Duration: ${this.escapeHtml(course.duration)}</span>
                        </div>
                    </div>
                `).join('');
            }

            updateResultCount(count) {
                const word = this.getCourseWord(count);
                this.resultCountSpan.textContent = `${count} ${word}`;
                
                // Додаємо анімацію
                this.resultCountSpan.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    this.resultCountSpan.style.transform = 'scale(1)';
                }, 200);
            }

            getCourseWord(count) {
                if (count === 1) return 'course';
                return 'courses';
            }

            updateActiveFiltersDisplay(searchTerm, category) {
                const activeFilters = [];
                
                if (searchTerm && searchTerm.trim() !== '') {
                    activeFilters.push(`
                        <div class="filter-tag">
                            🔍 "${this.escapeHtml(searchTerm)}"
                            <button onclick="window.clearSearch()">✕</button>
                        </div>
                    `);
                }
                
                if (category && category !== '') {
                    activeFilters.push(`
                        <div class="filter-tag">
                            📂 ${this.escapeHtml(category)}
                            <button onclick="window.clearCategory()">✕</button>
                        </div>
                    `);
                }
                
                if (activeFilters.length === 0) {
                    this.activeFiltersInfo.innerHTML = '<span style="color: #999;">No active filters</span>';
                } else {
                    this.activeFiltersInfo.innerHTML = activeFilters.join('');
                }
            }

            setupResetButton() {
                this.resetBtn.addEventListener('click', () => {
                    this.searchInput.value = '';
                    this.categorySelect.value = '';
                    
                    // Тригеримо події для оновлення потоків
                    this.searchInput.dispatchEvent(new Event('input'));
                    this.categorySelect.dispatchEvent(new Event('change'));
                    
                    this.showNotification('All filters have been reset', 'info');
                });
            }

            showError(message) {
                this.coursesContainer.innerHTML = `
                    <div class="no-results">
                        <h3>⚠️ Error</h3>
                        <p>${this.escapeHtml(message)}</p>
                        <button onclick="location.reload()" style="margin-top: 15px; padding: 8px 16px; background: #4facfe; color: white; border: none; border-radius: 5px; cursor: pointer;">
                            Retry
                        </button>
                    </div>
                `;
            }

            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: ${type === 'error' ? '#dc3545' : '#28a745'};
                    color: white;
                    padding: 12px 20px;
                    border-radius: 10px;
                    font-weight: 600;
                    z-index: 10000;
                    animation: slideInRight 0.3s ease;
                    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                `;
                notification.textContent = message;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.animation = 'slideOutRight 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 2000);
            }

            escapeHtml(str) {
                if (!str) return '';
                return str
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }
        }

        // Додаємо CSS для анімацій сповіщень
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOutRight {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Глобальні функції для очищення фільтрів
        window.clearSearch = () => {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = '';
            searchInput.dispatchEvent(new Event('input'));
        };

        window.clearCategory = () => {
            const categorySelect = document.getElementById('categorySelect');
            categorySelect.value = '';
            categorySelect.dispatchEvent(new Event('change'));
        };

        // ========== Initialize Application ==========
        const ui = new CoursesFilterUI();

        // Демонстрація роботи combineLatest в консолі
        console.log('='.repeat(60));
        console.log('📚 Courses Filter with combineLatest');
        console.log('='.repeat(60));
        console.log('✅ combineLatest объединяет:');
        console.log('   - Поток поиска (debounceTime + distinctUntilChanged)');
        console.log('   - Поток категории');
        console.log('✅ Автоматическое обновление при изменении любого фильтра');
        console.log('✅ Фильтрация по названию и категории одновременно');
        console.log('='.repeat(60));
        
        // Виводимо список доступних категорій
        console.log('📂 Available categories:', uniqueCategories);
        console.log('📚 Total courses available:', mockCourses.length);
    </script>
</body>
</html>
