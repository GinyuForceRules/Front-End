<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <link rel="stylesheet" href="style.css">

    <title>Courses Page - RxJS Reactive Search</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Courses Catalog</h1>
            <p>Reactive search with RxJS • debounceTime • distinctUntilChanged • switchMap</p>
        </div>

        <div class="search-section">
            <label class="search-label">🔍 Search courses by title:</label>
            <input type="text" id="searchInput" class="search-input" placeholder="Type to search... (e.g., JavaScript, React, Angular)">
            <div class="stats" id="stats">Loading courses...</div>
        </div>

        <div id="coursesContainer" class="courses-grid">
            <div class="loading">
                <div class="spinner"></div>
                Loading courses...
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/rxjs@7.8.1/dist/bundles/rxjs.umd.min.js"></script>
    <script>
        // Отримуємо елементи DOM
        const searchInput = document.getElementById('searchInput');
        const coursesContainer = document.getElementById('coursesContainer');
        const statsElement = document.getElementById('stats');

        // ========== Mock Courses Service ==========
        // Імітуємо сервіс для отримання курсів з Observable
        
        // Тестові дані курсів (мінімум 5 курсів)
        const mockCourses = [
            {
                id: 1,
                title: "JavaScript Advanced: From Basics to Expert",
                category: "Programming",
                duration: "40 hours"
            },
            {
                id: 2,
                title: "React.js Mastery with Hooks and Context",
                category: "Frontend",
                duration: "35 hours"
            },
            {
                id: 3,
                title: "Angular Complete Guide: RxJS and NgRx",
                category: "Frontend",
                duration: "50 hours"
            },
            {
                id: 4,
                title: "Python for Data Science and Machine Learning",
                category: "Data Science",
                duration: "45 hours"
            },
            {
                id: 5,
                title: "Node.js Backend Development with Express",
                category: "Backend",
                duration: "38 hours"
            },
            {
                id: 6,
                title: "Vue.js Fundamentals and Composition API",
                category: "Frontend",
                duration: "30 hours"
            },
            {
                id: 7,
                title: "TypeScript: The Complete Developer's Guide",
                category: "Programming",
                duration: "28 hours"
            },
            {
                id: 8,
                title: "Docker and Kubernetes: Containerization Mastery",
                category: "DevOps",
                duration: "42 hours"
            }
        ];

        // Сервіс для отримання всіх курсів (повертає Observable)
        class CoursesService {
            getAllCourses() {
                // Імітуємо асинхронний запит до API
                return new rxjs.Observable(subscriber => {
                    // Симулюємо затримку мережі (300-600ms)
                    const delay = Math.random() * 300 + 300;
                    
                    setTimeout(() => {
                        // Імітуємо можливу помилку (5% шанс для демонстрації обробки помилок)
                        const shouldError = false; // Math.random() < 0.05;
                        
                        if (shouldError) {
                            subscriber.error(new Error('Failed to load courses. Please try again.'));
                        } else {
                            subscriber.next(mockCourses);
                            subscriber.complete();
                        }
                    }, delay);
                });
            }

            // Метод для пошуку курсів за назвою (використовується в switchMap)
            searchCourses(searchTerm) {
                return this.getAllCourses().pipe(
                    rxjs.operators.map(courses => {
                        if (!searchTerm || searchTerm.trim() === '') {
                            return courses;
                        }
                        const searchLower = searchTerm.toLowerCase().trim();
                        return courses.filter(course => 
                            course.title.toLowerCase().includes(searchLower)
                        );
                    })
                );
            }
        }

        const coursesService = new CoursesService();

        // ========== RxJS Stream Setup ==========
        
        // Створюємо потік значень з поля вводу
        const searchStream = rxjs.fromEvent(searchInput, 'input').pipe(
            // Отримуємо значення з input
            rxjs.operators.map(event => event.target.value),
            // debounceTime - чекаємо 500ms після останнього вводу
            rxjs.operators.debounceTime(500),
            // distinctUntilChanged - ігноруємо повторювані значення
            rxjs.operators.distinctUntilChanged(),
            // switchMap - відміняє попередні запити при новому пошуку
            rxjs.operators.switchMap(searchTerm => {
                // Оновлюємо статус завантаження
                updateLoadingState();
                
                // Виконуємо пошук через сервіс
                return coursesService.searchCourses(searchTerm).pipe(
                    // Обробляємо помилки в потоці
                    rxjs.operators.catchError(error => {
                        console.error('Search error:', error);
                        return rxjs.of([]); // Повертаємо порожній масив при помилці
                    })
                );
            })
        );

        // Функція для оновлення стану завантаження
        function updateLoadingState() {
            coursesContainer.innerHTML = `
                <div class="loading" style="grid-column: 1/-1;">
                    <div class="spinner"></div>
                    Searching courses...
                </div>
            `;
        }

        // Функція для відображення курсів
        function displayCourses(courses, searchTerm = '') {
            if (!courses || courses.length === 0) {
                coursesContainer.innerHTML = `
                    <div class="no-results" style="grid-column: 1/-1;">
                        <h3>🔍 No courses found</h3>
                        <p>Try searching with different keywords</p>
                        ${searchTerm ? `<p style="margin-top: 10px; color: #667eea;">Search term: "${searchTerm}"</p>` : ''}
                    </div>
                `;
                statsElement.textContent = `📊 No courses found`;
                return;
            }

            // Відображаємо знайдені курси
            coursesContainer.innerHTML = courses.map(course => `
                <div class="course-card">
                    <div class="course-title">${escapeHtml(course.title)}</div>
                    <div class="course-category">📁 ${escapeHtml(course.category)}</div>
                    <div class="course-duration">
                        <span class="duration-icon">⏱️</span>
                        <span>Duration: ${escapeHtml(course.duration)}</span>
                    </div>
                </div>
            `).join('');

            // Оновлюємо статистику
            const totalCourses = courses.length;
            statsElement.textContent = `📚 Found ${totalCourses} course${totalCourses !== 1 ? 's' : ''}`;
        }

        // Функція для екранування HTML (безпека)
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Функція для відображення помилки
        function displayError(error) {
            coursesContainer.innerHTML = `
                <div class="error-message" style="grid-column: 1/-1;">
                    <strong>⚠️ Error:</strong> ${error.message || 'Failed to load courses'}
                    <br><br>
                    <button onclick="location.reload()" style="padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        Retry
                    </button>
                </div>
            `;
            statsElement.textContent = '❌ Error loading courses';
        }

        // ========== Initial Load ==========
        // Завантажуємо всі курси при старті
        const initialLoadSubscription = coursesService.getAllCourses().subscribe({
            next: (courses) => {
                displayCourses(courses, '');
                // Встановлюємо початкове значення для статистики
                statsElement.textContent = `📚 Total ${courses.length} courses available`;
            },
            error: (error) => {
                displayError(error);
            }
        });

        // ========== Subscribe to Search Stream ==========
        // Підписуємося на потік пошуку
        const searchSubscription = searchStream.subscribe({
            next: (filteredCourses) => {
                // Отримуємо поточний пошуковий термін для відображення
                const currentSearchTerm = searchInput.value;
                
                if (filteredCourses && filteredCourses.length > 0) {
                    displayCourses(filteredCourses, currentSearchTerm);
                } else if (filteredCourses && filteredCourses.length === 0) {
                    // Показуємо повідомлення про відсутність результатів
                    coursesContainer.innerHTML = `
                        <div class="no-results" style="grid-column: 1/-1;">
                            <h3>🔍 No courses found</h3>
                            <p>No courses match "${escapeHtml(currentSearchTerm)}"</p>
                            <p style="margin-top: 10px; font-size: 0.9rem; color: #667eea;">
                                Try: JavaScript, React, Python, Angular, Vue, Node
                            </p>
                        </div>
                    `;
                    statsElement.textContent = `📊 No results for "${escapeHtml(currentSearchTerm)}"`;
                }
            },
            error: (error) => {
                console.error('Search stream error:', error);
                displayError(error);
            }
        });

        // Додатково: Демонстрація роботи RxJS операторів в консолі
        console.log('✅ RxJS Stream initialized with:');
        console.log('   - debounceTime(500ms)');
        console.log('   - distinctUntilChanged()');
        console.log('   - switchMap() for request cancellation');
        console.log('   - Total courses available:', mockCourses.length);

        // Додаємо інформаційне повідомлення для розробників
        const devInfo = document.createElement('div');
        devInfo.style.cssText = `
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 1000;
            pointer-events: none;
        `;
        devInfo.textContent = '⚡ RxJS: debounceTime | distinctUntilChanged | switchMap';
        document.body.appendChild(devInfo);

        // Cleanup function (для повноти, хоча в звичайному HTML це не обов'язково)
        window.addEventListener('beforeunload', () => {
            initialLoadSubscription.unsubscribe();
            searchSubscription.unsubscribe();
        });
    </script>
</body>
</html>
